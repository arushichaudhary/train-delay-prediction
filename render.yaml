services:
  - type: web
    name: velora-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VELORA_SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
